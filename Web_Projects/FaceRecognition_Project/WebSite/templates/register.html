{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block head-title %}
    <title>Registration</title>
{% endblock head-title %}

{% block content %}
<div class="container">
    <form action="{% url 'myapp:register' %}" method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <fieldset class="form-group">
            <legend class="border-bottom mb-4 text-center">Register by uploading image </legend>
            {{ form1|crispy }}
            {{ form2|crispy }}
        </fieldset>
        <div class="form-group text-center">
            <button class="btn btn-outline-info" type="submit">Sign Up</button>
            <a href="{% url 'myapp:register_snapshot' %}" class="btn btn-outline-warning"> Register by taking a photo</a>
        </div>
    </form>
</div>
{% endblock content %}
